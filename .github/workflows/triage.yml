name: Triage and Research

on:
  schedule:
    - cron: '0 10 * * *'   # 10am UTC daily
  workflow_dispatch:         # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  triage:
    name: Triage submitted tasks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_SKIP_PERMISSIONS: '1'   # Non-interactive / CI mode
        run: |
          if grep -q '`submitted`' BACKLOG.md; then
            claude -p "$(cat .github/prompts/triage.md)" \
              --allowedTools "Read,Edit,Write,Glob,Grep" \
              --model claude-haiku-4-5-20251001
          else
            echo "No submitted tasks — skipping Claude"
          fi

      - name: Commit triage results
        run: |
          git config user.name "Claude Code"
          git config user.email "claude-code[bot]@users.noreply.github.com"
          git add BACKLOG.md
          git diff --staged --quiet || git commit -m "chore(triage): triage run $(date -u +%Y-%m-%d)"
          git push

      - name: Notify Slack if tasks need approval
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          count=$(grep -c '`triaged`' BACKLOG.md 2>/dev/null || echo 0)
          if [ "$count" -gt 0 ] && [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"🔍 *Hopper — ${count} task(s) awaiting your go/no-go*\nStatus: \`triaged\` → change to \`approved\` to proceed\n<https://github.com/matthewnewstory/hopper/blob/main/BACKLOG.md|View BACKLOG.md>\"}"
          fi

  research:
    name: Research approved tasks
    needs: triage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run research and plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_SKIP_PERMISSIONS: '1'
        run: |
          if grep -q '`approved`' BACKLOG.md; then
            claude -p "$(cat .github/prompts/research.md)" \
              --allowedTools "Read,Edit,Write,Glob,Grep" \
              --model claude-sonnet-4-6
          else
            echo "No approved tasks — skipping Claude"
          fi

      - name: Commit plan results
        run: |
          git config user.name "Claude Code"
          git config user.email "claude-code[bot]@users.noreply.github.com"
          git add BACKLOG.md plans/
          git diff --staged --quiet || git commit -m "chore(research): plan written $(date -u +%Y-%m-%d)"
          git push

      - name: Notify Slack if plans need review
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          count=$(grep -c '`planned`' BACKLOG.md 2>/dev/null || echo 0)
          if [ "$count" -gt 0 ] && [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"📝 *Hopper — ${count} plan(s) ready for your review*\nStatus: \`planned\` → annotate the plan file and change to \`reviewed\` to proceed\n<https://github.com/matthewnewstory/hopper/blob/main/BACKLOG.md|View BACKLOG.md>\"}"
          fi
